<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डिजिटल कार्ड - शिवाकांत चौधरी</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }
        .profile-img {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h2 { 
            margin: 0; 
            color: #333; 
        }
        p { 
            color: #666; 
            margin-top: 5px; 
            margin-bottom: 25px; 
        }
        .btn {
            display: block;
            width: 90%;
            padding: 12px;
            margin: 10px auto;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            color: white;
        }
        .btn-whatsapp {
            background-color: #25D366; /* व्हाट्सएप का हरा रंग */
        }
        .btn-call {
            background-color: #007bff; /* नीले रंग का कॉल बटन */
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">👨‍💻</div>
        <h2>शिवाकांत चौधरी</h2>
        <p>वेब डेवलपर (Web Developer)</p>
        
        <a href="https://wa.me/9682204065" class="btn btn-whatsapp">📱 WhatsApp पर जुड़ें</a>
        
        <a href="tel:+9682204065" class="btn btn-call">📞 कॉल करें</a>
    </div>

</body>
</html>
